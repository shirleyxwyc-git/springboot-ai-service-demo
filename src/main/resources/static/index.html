<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>AI智能系统</title>

  <!-- 🔥 載入 Markdown 解析庫 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>


  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial
    }

    body {
      max-width: 900px;
      margin: 20px auto;
      background: #f5f5f5;
      padding: 0 20px
    }

    .tab {
      display: flex;
      gap: 10px;
      margin-bottom: 20px
    }

    .tab button {
      padding: 10px 20px;
      border: none;
      background: #fff;
      border-radius: 6px;
      cursor: pointer
    }

    .tab button.active {
      background: #007bff;
      color: #fff
    }

    .page {
      display: none;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      min-height: 500px
    }

    .page.active {
      display: block
    }

    .chat-box {
      height: 400px;
      overflow-y: auto;
      border: 1px solid #eee;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 15px;
      background: #fafafa
    }

    .msg {
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 6px;
      max-width: 80%
    }

    .user {
      background: #007bff;
      color: #fff;
      margin-left: auto
    }

    .ai {
      background: #e9e9eb
    }

    .input-bar {
      display: flex;
      gap: 10px
    }

    input,
    textarea {
      flex: 1;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px
    }

    button {
      padding: 12px 20px;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer
    }

    .result {
      margin-top: 15px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 6px;
      white-space: pre-wrap
    }
  </style>
</head>

<body>

  <div class="tab">
    <button class="tab-btn active" data-page="chat">AI 聊天</button>
    <button class="tab-btn" data-page="audit">內容審核</button>
    <button class="tab-btn" data-page="data">數據分析</button>
    <button class="tab-btn" data-page="knowledge">私有知識庫</button>
  </div>

  <div class="page active" id="chat">
    <div class="chat-box" id="chatBox"></div>
    <div class="input-bar">
      <input id="question" placeholder="輸入問題...">
      <button onclick="sendChat()">發送</button>
    </div>
  </div>

  <div class="page" id="audit">
    <textarea id="content" rows="6" placeholder="輸入要審核的內容"></textarea>
    <button onclick="doAudit()" style="margin-top:10px">開始審核</button>
    <div class="result" id="auditResult"></div>
  </div>

  <div class="page" id="data">
    <textarea id="data" rows="4" placeholder="數據示例：1月銷量100，2月200，3月350"></textarea>
    <input id="dataQuestion" placeholder="你想分析什麼？">
    <button onclick="doAnalyze()" style="margin-top:10px">開始分析</button>
    <div class="result" id="dataResult"></div>
  </div>

  <div class="page" id="knowledge">
    <!-- 文字輸入 -->
    <textarea id="knowledgeContent" rows="6" placeholder="直接貼文字，或 👇 上傳檔案"></textarea>
  
    <!-- 檔案上傳按鈕（支援 PDF / Word / TXT） -->
    <input type="file" id="knowledgeFile" accept=".pdf,.docx,.txt" style="margin-top:10px">
  
    <input id="kQuestion" placeholder="輸入問題" style="margin-top:10px">
    <button onclick="askKnowledge()" style="margin-top:10px">查詢答案</button>
    <div class="result" id="kResult"></div>
    </div>

  <script>
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
        btn.classList.add('active')
        document.getElementById(btn.dataset.page).classList.add('active')
      }
    })

    let fullText = ""; // 🔥 用來儲存完整AI回覆

    function sendChat() {
      const q = document.getElementById('question').value.trim()
      if (!q) return
      const box = document.getElementById('chatBox')
      box.innerHTML += `<div class="msg user">${q}</div>`
      document.getElementById('question').value = ''
      const ai = document.createElement('div')
      ai.className = 'msg ai'
      box.appendChild(ai)
      box.scrollTop = box.scrollHeight

      fullText = ""; // 重製

      const es = new EventSource('/ai/stream?question=' + encodeURIComponent(q))

      es.onmessage = e => {
        fullText += e.data;

        // 🔥 關鍵：渲染 Markdown
        ai.innerHTML = marked.parse(fullText);
        box.scrollTop = box.scrollHeight
      }
      es.onerror = () => es.close()
    }

    async function doAudit() {
      const r = await fetch('/ai/audit?content=' + encodeURIComponent(document.getElementById('content').value))
      document.getElementById('auditResult').innerText = await r.text()
    }

    async function doAnalyze() {
      const data = encodeURIComponent(document.getElementById('data').value)
      const q = encodeURIComponent(document.getElementById('dataQuestion').value)
      const r = await fetch('/ai/analyze?data=' + data + '&question=' + q)
      document.getElementById('dataResult').innerText = await r.text()
    }

    // async function askKnowledge() {
    //     const knowledgeContent = document.getElementById('knowledgeContent').value;
    //     console.log('知識庫內容:', knowledgeContent);
        
    //     const questionText = document.getElementById('kQuestion').value;

    //     const encodedContent = encodeURIComponent(knowledgeContent);
    //     const encodedQuestion = encodeURIComponent(questionText);

    //     const res = await fetch('/ai/knowledge?content=' + encodedContent + '&question=' + encodedQuestion);

    //     const text = await res.text();
    //     document.getElementById('kResult').innerHTML = marked.parse(text);
      
    // }

    async function askKnowledge() {
      const question = document.getElementById('kQuestion').value;
      const fileInput = document.getElementById('knowledgeFile');
      const textContent = document.getElementById('knowledgeContent').value;

      const formData = new FormData();
      formData.append("question", question);

      if (fileInput.files.length > 0) {
        formData.append("file", fileInput.files[0]);
      } else {
        formData.append("content", textContent);
      }

      try {
        const res = await fetch("/ai/knowledge/upload", {
          method: "POST",
          body: formData
        });
        const text = await res.text();
        document.getElementById("kResult").innerHTML = marked.parse(text);
      } catch (e) {
        alert("上傳失敗：" + e);
      }
}




  </script>
</body>

</html>
